<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PulseWifi Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #161b22; border: 1px solid #30363d; color: white; margin-bottom: 20px; }
        .btn-pulse { background-color: #238636; color: white; border: none; }
        .btn-pulse:hover { background-color: #2ea043; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand" href="#">PULSE WIFI <span class="text-info" style="font-size: 0.7rem;">v1.0-WEB</span></a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Sistem Kontrolü</h5>
                    <hr>
                    <p>Adaptör: <span id="current-iface" class="text-warning">Seçilmedi</span></p>
                    <button class="btn btn-outline-info btn-sm w-100 mb-2" onclick="loadInterfaces()">Kartları Tara</button>
                    <div id="interface-list" class="list-group list-group-flush mt-2"></div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-3">
                    <h5>Operasyon Merkezi</h5>
                    <div class="d-flex gap-2">
                        <button class="btn btn-danger btn-lg flex-fill">RADAR'I BAŞLAT</button>
                        <button class="btn btn-warning btn-lg flex-fill">CHAOS MODU</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadInterfaces() {
            fetch('/api/interfaces')
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('interface-list');
                    list.innerHTML = '';
                    data.interfaces.forEach(iface => {
                        list.innerHTML += `<button class="list-group-item list-group-item-action bg-dark text-light border-secondary" onclick="selectIface('${iface}')">${iface}</button>`;
                    });
                });
        }
        function selectIface(iface) {
            document.getElementById('current-iface').innerText = iface;
        }
    </script>
</body>
</html>
