<div class="col-md-8">
    <div class="card p-3">
        <h5>Operasyon Merkezi</h5>
        <div class="d-flex gap-2 mb-3">
            <button id="scan-btn" class="btn btn-danger btn-lg flex-fill" onclick="runRadar()">RADAR'I BAŞLAT</button>
            <button class="btn btn-warning btn-lg flex-fill">CHAOS MODU</button>
        </div>
        
        <div class="table-responsive">
            <table class="table table-dark table-hover" id="network-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Sinyal</th>
                        <th>SSID (Ağ Adı)</th>
                        <th>Marka</th>
                        <th>Kanal</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="network-body">
                    </tbody>
            </table>
        </div>
        <div id="loader" class="text-center" style="display: none;">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="mt-2">Çevre taranıyor, bekleyin...</p>
        </div>
    </div>
</div>

<script>
let selectedIface = "";

function selectIface(iface) {
    selectedIface = iface;
    document.getElementById('current-iface').innerText = iface;
}

function runRadar() {
    if (!selectedIface) {
        alert("Kanka önce sol panelden bir Wi-Fi kartı seç!");
        return;
    }

    const table = document.getElementById('network-table');
    const body = document.getElementById('network-body');
    const loader = document.getElementById('loader');
    const btn = document.getElementById('scan-btn');

    // UI Hazırlığı
    table.style.display = 'none';
    loader.style.display = 'block';
    btn.disabled = true;
    body.innerHTML = '';

    fetch(`/api/scan?iface=${selectedIface}`)
        .then(res => res.json())
        .then(data => {
            loader.style.display = 'none';
            btn.disabled = false;
            
            if (data.status === "success" && data.networks.length > 0) {
                table.style.display = 'table';
                data.networks.forEach(net => {
                    // Senin radar.py'deki bar mantığını burada basitçe simüle edelim
                    let row = `<tr>
                        <td><span class="text-success">${net.dbm} dBm</span></td>
                        <td><strong>${net.essid}</strong></td>
                        <td><span class="badge bg-secondary">${net.vendor}</span></td>
                        <td>${net.ch}</td>
                        <td><button class="btn btn-sm btn-outline-danger" onclick="strikeTarget('${net.bssid}')">VUR</button></td>
                    </tr>`;
                    body.innerHTML += row;
                });
            } else {
                alert("Etrafta hiç ağ bulunamadı veya bir hata oluştu.");
            }
        });
}
</script>
